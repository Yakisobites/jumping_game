name: Rust CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # 1) Fast feedback: format, lint, and unit tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run code quality checks and tests
        run: just test

  # 2) Validate Dockerfile build.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t jumping_game .

  # 3) Validate game WASM build.
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build WASM release
        run: |
          just add-target
          just build

  # 4) Build and deploy static site to GitHub Pages.
  deploy:
    needs: [test, docker-build, build-wasm]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-opt (Binaryen)
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown
        env:
          RUSTFLAGS: "-C link-arg=--allow-undefined"

      - name: Optimize WASM
        run: |
          mkdir -p dist
          wasm-opt -O3 target/wasm32-unknown-unknown/release/ferris_jumping_game.wasm -o dist/ferris_jumping_game.wasm

      - name: Copy static files
        run: |
          cp index.html dist/
          cp -r assets dist/ || true

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
